name: Google Indexing Automation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  google-indexing:
    runs-on: ubuntu-latest
    steps:
      - name: Request Google Indexing
        # Switched explicitly to the verified stable release version tag
        uses: robingenz/action-google-indexing@v1.0.2
        with:
          siteUrl: 'https://symbols.thenepal.io'
          gcpServiceAccountKey: ${{ secrets.GCP_SA_KEY }}
