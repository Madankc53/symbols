name: Generate Sitemap

on:
  push:
    branches:
      - main # Change to 'master' if your default branch uses that name
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - '_headers'
      - '_redirects'

jobs:
  sitemap_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history so file modification dates match real git history

      - name: Generate Sitemap
        id: sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://symbols.thenepal.io/
          exclude-paths: 404.html # Keeps your 404 page hidden from search engine indexing

      - name: Commit and Push Sitemap
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add sitemap.xml
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated sitemap update"
          git push
