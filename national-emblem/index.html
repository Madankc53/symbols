.lang-switch-mobile{display:none;}

.toc-desktop a{flex-shrink:0;font-size:.82rem;font-weight:600;color:var(--maroon-dark);background:var(--white);border:1px solid var(--rule);border-radius:999px;padding:6px 14px;text-decoration:none;}
.toc-desktop a:hover,.toc-desktop a:focus-visible{background:var(--marigold);border-color:var(--marigold);color:var(--ink);}

/* Mobile: collapsible accordion TOC, hidden on desktop */
.toc-mobile{display:none;}
